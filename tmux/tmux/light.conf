set -g status-bg 'white'
set -g status-fg '#1a1a1a'
set -g status-left '#[fg=white, bg=#1a1a1a] #H #[fg=white, bg=#555555] #S #[fg=#1a1a1a, bg=white]'
set -g status-right "#[fg=white, bg=#555555] #(free -h | awk '/^Mem/ {print $4\"/\"$2}') #[fg=white, bg=#1a1a1a] %a,%d %b %H:%M "
set -g status-style "bg=white,fg=#1a1a1a"
set -g window-status-style "fg=#333333,bg=white"
set -g window-status-current-style "fg=#1a1a1a,bg=white,bold"
